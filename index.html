<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHALE TRACKER Pro</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #00ff66;
    font-family: monospace;
    padding-bottom: 20px;
}

header {
    padding: 15px;
    border-bottom: 1px solid #00ff66;
    text-align: center;
    font-size: 16px;
    letter-spacing: 2px;
    font-weight: bold;
}

.live-clock {
    font-size: 12px;
    color: #00aa44;
    margin-top: 5px;
    font-weight: normal;
}

.token {
    font-size: 14px;
    padding: 15px;
    border-bottom: 1px solid #00ff66;
    background: #051a05;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    border-bottom: 1px solid #00ff66;
}

.box {
    border-right: 1px solid #00ff66;
    border-bottom: 1px solid #00ff66;
    padding: 15px;
}

.box:last-child {
    border-right: none;
}

.title {
    font-size: 11px;
    color: #00aa44;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.value {
    font-size: 20px;
    margin-top: 8px;
    font-weight: bold;
}

.feed-header {
    padding: 15px 15px 5px 15px;
    font-size: 14px;
    font-weight: bold;
    color: #00ff66;
}

.feed {
    padding: 0 15px;
    font-size: 12px;
    max-height: 300px;
    overflow-y: auto;
}

.tx {
    padding: 6px 0;
    border-bottom: 1px dotted #003311;
    display: flex;
    justify-content: space-between;
}

.tx-left {
    display: flex;
    gap: 10px;
}

.time-stamp {
    color: #555;
}

.buy { color: #00ff66; }
.sell { color: #ff3333; }
.accumulate { color: #3399ff; }
</style>
</head>

<body>

<header>
    <div>WHALETRACKERZONE // LIVE ON-CHAIN PROTOCOL</div>
    <div id="clock" class="live-clock">SYNCING TIME...</div>
</header>

<div class="token">
    TOKEN: <b>SIREN / USDT (BSC: 0x997a...e1)</b>
</div>

<div class="grid-container">
    <div class="box">
        <div class="title">Current Price</div>
        <div id="price-val" class="value">$0.0465</div>
    </div>
    <div class="box">
        <div class="title">Market Cap</div>
        <div id="mcap-val" class="value">$33.74M</div>
    </div>
    <div class="box">
        <div class="title">Whale Count</div>
        <div id="whale-val" class="value">1,284</div>
    </div>
    <div class="box">
        <div class="title">1H Buy Volume</div>
        <div id="buy-1h-val" class="value">$2.40M</div>
    </div>
    <div class="box">
        <div class="title">1H Sell Volume</div>
        <div id="sell-1h-val" class="value">$1.80M</div>
    </div>
    <div class="box">
        <div class="title">1H Net Flow</div>
        <div id="netflow-val" class="value">+0.60M</div>
    </div>
</div>

<div class="feed-header">LIVE TRANSACTION LOG:</div>
<div class="feed" id="tx-feed">
    <!-- Log akan diisi secara otomatis oleh JavaScript -->
</div>

<script>
// --- INITIAL CONFIGURATION ---
let currentPrice = 0.04652;     
const totalSupply = 725000000;  
let buyVolume1h = 2400000;      
let sellVolume1h = 1800000;     
let whaleCount = 382;

// Fungsi helper untuk mendapatkan waktu saat ini (HH:MM:SS)
function getCurrentTime() {
    const now = new Date();
    return now.toLocaleTimeString('en-US', { hour12: false });
}

// Update jam live di header setiap 1 detik
setInterval(() => {
    document.getElementById("clock").innerText = "LOCAL TIME: " + getCurrentTime();
}, 1000);

function formatUSD(val) {
    return '$' + val.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
}

function formatCompactUSD(val) {
    if (val >= 1000000) {
        return '$' + (val / 1000000).toFixed(2) + 'M';
    } else if (val >= 1000) {
        return '$' + (val / 1000).toFixed(2) + 'K';
    }
    return '$' + val.toFixed(2);
}

function updateDashboard() {
    let marketCap = currentPrice * totalSupply;
    let netFlow = buyVolume1h - sellVolume1h;
    let netFlowSign = netFlow >= 0 ? '+' : '';

    document.getElementById("price-val").innerText = formatUSD(currentPrice);
    document.getElementById("mcap-val").innerText = formatCompactUSD(marketCap);
    document.getElementById("whale-val").innerText = whaleCount.toLocaleString('en-US');
    document.getElementById("buy-1h-val").innerText = formatCompactUSD(buyVolume1h);
    document.getElementById("sell-1h-val").innerText = formatCompactUSD(sellVolume1h);
    document.getElementById("netflow-val").innerText = netFlowSign + formatCompactUSD(netFlow);
    
    if(netFlow >= 0) {
        document.getElementById("netflow-val").style.color = "#00ff66";
    } else {
        document.getElementById("netflow-val").style.color = "#ff3333";
    }
}

updateDashboard();

// --- TICKER SIMULATION ---
// Fungsi untuk menambahkan baris transaksi baru
function addTransaction() {
    const feed = document.getElementById("tx-feed");
    const actions = ["BUY", "SELL", "ACCUMULATE"];
    const action = actions[Math.floor(Math.random() * actions.length)];
    const wallet = "0x" + Math.random().toString(16).slice(2, 6).toUpperCase();
    
    const tokenAmount = (Math.floor(Math.random() * 900) + 50) * 1000;
    const usdValue = tokenAmount * currentPrice;

    let actionClass = '';
    if (action === "BUY") {
        actionClass = 'buy';
        buyVolume1h += usdValue;
        currentPrice *= (1 + (Math.random() * 0.003)); 
    } else if (action === "SELL") {
        actionClass = 'sell';
        sellVolume1h += usdValue;
        currentPrice *= (1 - (Math.random() * 0.003)); 
    } else if (action === "ACCUMULATE") {
        actionClass = 'accumulate';
        buyVolume1h += usdValue;
        currentPrice *= (1 + (Math.random() * 0.001)); 
        if (Math.random() > 0.8) whaleCount++;
    }

    const div = document.createElement("div");
    div.className = `tx ${actionClass}`;
    const tokenDisplay = (tokenAmount / 1000) + "K";
    const timeStamp = getCurrentTime();
    
    // Struktur HTML untuk log transaksi dengan timestamp
    div.innerHTML = `
        <div class="tx-left">
            <span class="time-stamp">[${timeStamp}]</span>
            <span>SIREN ${wallet} ${action}</span>
        </div>
        <span>${tokenDisplay} tokens (${formatCompactUSD(usdValue)})</span>
    `;
    
    feed.prepend(div);

    if (feed.children.length > 20) {
        feed.removeChild(feed.lastChild);
    }

    updateDashboard();
}

// Inisialisasi 3 transaksi awal agar tidak kosong saat baru dibuka
for(let i=0; i<3; i++) {
    addTransaction();
}

// Jalankan simulasi transaksi baru setiap 2.5 detik
setInterval(addTransaction, 2500);
</script>

</body>
</html>
